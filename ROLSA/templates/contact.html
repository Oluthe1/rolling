{% extends "base.html" %}
{% block title %}Contact Us{% endblock %}
{% block content %}

<div class="container">
    <h2 class="mb-4">Contact Us</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, msg in messages %}
    <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }}" role="alert">
        {{ msg }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="post" novalidate>
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input id="name" name="name" type="text" class="form-control"
                   value="{{ form.name if form else '' }}" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" name="email" type="email" class="form-control"
                   value="{{ form.email if form else '' }}" required>
        </div>

        <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea id="message" name="message" class="form-control" rows="6" required>{{ form.message if form else '' }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
</div>

{% endblock %}
